name: C++ CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # 1. THE MATRIX STRATEGY
    strategy:
      fail-fast: false # If Release fails, keep running Debug so we get the full picture
      matrix:
        build_type: [Release, Debug]

    steps:
    - uses: actions/checkout@v4

    # 2. DYNAMIC FEATURE TOGGLE
    # This evaluates which matrix we are currently in and sets the correct CMake flag.
    - name: Set CMake Test Flag
      run: |
        if [ "${{ matrix.build_type }}" = "Release" ]; then
          echo "TEST_FLAG=-DBUILD_TESTING=OFF" >> "$GITHUB_ENV"
        else
          echo "TEST_FLAG=-DBUILD_TESTING=ON" >> "$GITHUB_ENV"
        fi

    # 3. CONFIGURE
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ${{ env.TEST_FLAG }}

    # 4. BUILD
    - name: Build Target
      run: cmake --build ${{github.workspace}}/build --config ${{ matrix.build_type }}

    # 5. TEST (Gated to Debug Only)
    # This step will physically skip execution on the Release runner.
    - name: Run Unit Tests
      if: matrix.build_type == 'Debug'
      working-directory: ${{github.workspace}}/build
      run: ctest -C ${{ matrix.build_type }} --output-on-failure